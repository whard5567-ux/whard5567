<div class="equipment-list-container">
  <div class="card">
    <div class="table-header">
      <h2>Daftar Peralatan</h2>
    </div>
    <div class="table-responsive">
      <table class="equipment-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama Peralatan</th>
            <th>Tipe</th>
            <th>Health Index</th>
            <th>Status</th>
            <th>Pemeliharaan Terakhir</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of equipment">
            <td>#{{ item.id }}</td>
            <td class="font-bold">{{ item.name }}</td>
            <td>{{ item.type }}</td>
            <td>
              <div class="health-progress">
                <div class="progress-bar">
                  <div class="progress-fill" [style.width]="item.health_index + '%'" [style.background]="getHealthColor(item.health_index)"></div>
                </div>
                <span class="progress-text">{{ item.health_index }}%</span>
              </div>
            </td>
            <td>
              <span class="badge" [ngClass]="'badge-' + item.status.toLowerCase()">{{ item.status }}</span>
            </td>
            <td>{{ item.last_maintenance }}</td>
            <td>
              <a [routerLink]="['/equipment', item.id]" class="btn-detail">Detail</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
